<section class="stats-section w-full font-[Blinker]">
  <div class="stats-shell mx-auto w-full max-w-[1440px]">
    <div class="stats-inner mx-auto flex w-full max-w-[1120px] flex-col items-center gap-6">
      <div class="stats-heading flex w-full flex-col items-center gap-4 pb-10 text-center">
        <h2 class="stats-title m-0">
          {{ 'DASHBOARD.stats.title' | translate }}
        </h2>

        <p class="stats-subtitle m-0">
          {{ 'DASHBOARD.stats.subtitle' | translate }}
        </p>
      </div>

      <div class="stats-grid grid w-full grid-cols-1 gap-6 md:grid-cols-3">
        <article class="stats-card">
          <div class="stats-number">
            {{ stats().services }}
          </div>

          <p class="stats-text m-0">
            {{ 'DASHBOARD.stats.services' | translate }}
          </p>
        </article>

        <article class="stats-card">
          <div class="stats-number">
            10+
          </div>

          <p class="stats-text m-0">
            {{ 'DASHBOARD.stats.sectors' | translate }}
          </p>
        </article>

        <article class="stats-card">
          <div class="stats-number">
            {{ stats().providers }}
          </div>

          <p class="stats-text m-0">
            {{ 'DASHBOARD.stats.providers' | translate }}
          </p>
        </article>
      </div>
    </div>
  </div>
</section>
